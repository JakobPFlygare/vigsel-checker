name: Vigsel Checker

on:
  schedule:
    - cron: '0 4 * * *'  # 06:00 CEST (UTC+2)
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a test WhatsApp message'
        required: false
        default: false
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 1200  # 20 hours, covers 06:00-02:00 Swedish time
    steps:
      - uses: actions/checkout@v4

      - run: python3 checker.py
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_KEY: ${{ secrets.CALLMEBOT_KEY }}
          TEST_MODE: ${{ inputs.test }}
