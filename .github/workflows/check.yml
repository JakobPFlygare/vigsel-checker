name: Vigsel Checker

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a test WhatsApp message'
        required: false
        default: false
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: last_notified.txt
          key: vigsel-state

      - run: python3 checker.py
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_KEY: ${{ secrets.CALLMEBOT_KEY }}
          TEST_MODE: ${{ inputs.test }}
